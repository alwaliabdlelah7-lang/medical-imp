name: 🚀 نشر IMP التلقائي

on:
  push:
    branches: [ master ]
  workflow_dispatch:

jobs:
  # 1. نشر الخادم الخلفي على Render
  backend:
    runs-on: ubuntu-latest
    steps:
      - name: تشغيل Render Deploy Hook
        run: curl -X POST "${{ secrets.RENDER_DEPLOY_HOOK }}"

  # 2. نشر الواجهة الأمامية على Vercel
  frontend:
    runs-on: ubuntu-latest
    needs: backend
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.22.0'
      - run: flutter pub get
        working-directory: ./frontend_flutter
      - run: flutter build web --release
        working-directory: ./frontend_flutter
      - run: npm install --global vercel@latest
      - name: النشر على Vercel (أمر في سطر واحد)
        run: cd frontend_flutter && vercel --token ${{ secrets.VERCEL_TOKEN }} --prod --yes
