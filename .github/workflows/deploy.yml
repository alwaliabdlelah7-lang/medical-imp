name: 🚀 IMP Full Deployment

on:
  push:
    branches: [ master ]
  workflow_dispatch:

jobs:
  # ===============================
  # 1. نشر الخادم الخلفي على Render
  # ===============================
  backend:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger Render Deploy Hook
        run: curl -X POST "${{ secrets.RENDER_DEPLOY_HOOK }}"

  # ===============================
  # 2. نشر Flutter Web على Vercel
  # ===============================
  frontend:
    runs-on: ubuntu-latest
    needs: backend
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.22.0'
      - run: flutter pub get
        working-directory: ./frontend_flutter
      - run: flutter build web --release
        working-directory: ./frontend_flutter
      - run: npm install --global vercel@latest
      - name: Deploy to Vercel
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
        run: cd frontend_flutter && vercel --token $VERCEL_TOKEN --prod --yes

  # ===============================
  # 3. بناء Android APK وتحميله
  # ===============================
  android:
    runs-on: ubuntu-latest
    needs: backend
    steps:
      - uses: actions/checkout@v4
      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.22.0'
      - run: flutter pub get
        working-directory: ./frontend_flutter
      - run: flutter build apk --release
        working-directory: ./frontend_flutter
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: medical-imp-app
          path: frontend_flutter/build/app/outputs/flutter-apk/app-release.apk
