name: 🚀 نشر IMP التلقائي

on:
  push:
    branches: [ master ]
  workflow_dispatch:

jobs:
  backend:
    runs-on: ubuntu-latest
    steps:
      - name: تشغيل Render Deploy Hook
        run: curl -X POST "${{ secrets.RENDER_DEPLOY_HOOK }}"

  frontend:
    runs-on: ubuntu-latest
    needs: backend
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.22.0'
      - run: flutter pub get
        working-directory: ./frontend_flutter
      - run: flutter build web --release
        working-directory: ./frontend_flutter
      - run: npm install --global vercel@latest
      - name: النشر على Vercel
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
        run: cd frontend_flutter && vercel --token $VERCEL_TOKEN --prod --yes
# 3. بناء تطبيق Android APK
android:
  name: 📱 Build Android APK
  runs-on: ubuntu-latest
  needs: backend   # لا يعتمد على frontend، يمكن تشغيله بالتوازي
  steps:
    - uses: actions/checkout@v4
    - name: Set up JDK
      uses: actions/setup-java@v4
      with:
        distribution: 'temurin'
        java-version: '17'
    - uses: subosito/flutter-action@v2
      with:
        flutter-version: '3.22.0'
    - name: Install dependencies
      run: flutter pub get
      working-directory: ./frontend_flutter
    - name: Build APK (release)
      run: flutter build apk --release
      working-directory: ./frontend_flutter
    - name: Upload APK as artifact
      uses: actions/upload-artifact@v4
      with:
        name: medical-imp-apk
        path: frontend_flutter/build/app/outputs/flutter-apk/app-release.apk
