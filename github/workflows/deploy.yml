name: 🚀 النشر التلقائي للنظام الطبي المتكامل (IMP)

on:
  push:
    branches:
      - main          # أو master حسب الفرع الرئيسي لديك
      - master
  workflow_dispatch:  # يسمح بالتشغيل اليدوي من واجهة GitHub

jobs:
  # ============================================================
  # 1. نشر الخادم الخلفي (Node.js) على Render
  # ============================================================
  deploy-backend:
    name: 📡 نشر الخادم على Render
    runs-on: ubuntu-latest
    steps:
      - name: تشغيل Webhook النشر في Render
        run: curl -X POST "${{ secrets.RENDER_DEPLOY_HOOK }}"

  # ============================================================
  # 2. بناء ونشر الواجهة الأمامية (Flutter Web) على Vercel
  # ============================================================
  deploy-frontend:
    name: 🖥️ نشر Flutter Web على Vercel
    runs-on: ubuntu-latest
    needs: deploy-backend  # يعتمد على نجاح نشر الخادم (اختياري)
    steps:
      - name: 1️⃣ استنساخ الكود
        uses: actions/checkout@v4

      - name: 2️⃣ إعداد بيئة Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.22.0'
          channel: 'stable'

      - name: 3️⃣ تثبيت الاعتماديات
        run: flutter pub get
        working-directory: ./frontend_flutter

      - name: 4️⃣ بناء التطبيق للإنتاج (Flutter Web)
        run: flutter build web --release --base-href=/ --web-renderer html
        working-directory: ./frontend_flutter

      - name: 5️⃣ تثبيت Vercel CLI
        run: npm install --global vercel@latest

      - name: 6️⃣ نشر الملفات على Vercel
        run: |
          vercel --token ${{ secrets.VERCEL_TOKEN }} \
                 --prod \
                 --yes \
                 --cwd ./frontend_flutter
