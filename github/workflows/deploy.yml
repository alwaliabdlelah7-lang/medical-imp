name: 🚀 النشر التلقائي للنظام الطبي المتكامل (IMP)

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  # نشر الخادم الخلفي على Render
  deploy-backend:
    name: 📡 نشر الخادم على Render
    runs-on: ubuntu-latest
    steps:
      - name: تشغيل Webhook النشر في Render
        run: curl -X POST "${{ secrets.RENDER_DEPLOY_HOOK }}"

  # بناء ونشر الواجهة الأمامية على Vercel
  deploy-frontend:
    name: 🖥️ نشر Flutter Web على Vercel
    runs-on: ubuntu-latest
    needs: deploy-backend
    steps:
      - name: استنساخ الكود
        uses: actions/checkout@v4

      - name: إعداد Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.22.0'

      - name: تثبيت التبعيات
        run: flutter pub get
        working-directory: ./frontend_flutter

      - name: بناء التطبيق (Flutter Web)
        run: flutter build web --release
        working-directory: ./frontend_flutter

      - name: تثبيت Vercel CLI
        run: npm install --global vercel@latest

      - name: النشر على Vercel
        run: |
          cd frontend_flutter
          vercel --token ${{ secrets.VERCEL_TOKEN }} --prod --yes
